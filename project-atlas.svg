<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 980" role="img" aria-labelledby="title desc">
  <title id="title">Macroeconomic Atlas interface</title>
  <desc id="desc">An editorial dashboard composition combining macroeconomic signals, countries and trends.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#11313D"/><stop offset="1" stop-color="#071820"/>
    </linearGradient>
    <linearGradient id="chart" x1="0" y1="1" x2="0" y2="0">
      <stop stop-color="#BDE8D2" stop-opacity="0.04"/><stop offset="1" stop-color="#BDE8D2" stop-opacity="0.54"/>
    </linearGradient>
  </defs>
  <rect width="900" height="980" fill="#071820"/>
  <circle cx="720" cy="190" r="310" fill="#BDE8D2" fill-opacity="0.035"/>
  <g transform="translate(74 84)">
    <text fill="#FFFFFF" fill-opacity="0.38" font-family="Inter,Arial,sans-serif" font-size="13" letter-spacing="3">MACROECONOMIC ATLAS</text>
    <text y="68" fill="#FFFFFF" font-family="Georgia,serif" font-size="52">Reading economies</text>
    <text y="122" fill="#FFFFFF" fill-opacity="0.46" font-family="Georgia,serif" font-size="52">as connected systems.</text>
  </g>
  <g transform="translate(74 278)">
    <rect width="752" height="518" rx="18" fill="url(#panel)" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <path d="M0 64H752" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <circle cx="28" cy="32" r="4" fill="#FFFFFF" fill-opacity="0.25"/><circle cx="44" cy="32" r="4" fill="#FFFFFF" fill-opacity="0.18"/><circle cx="60" cy="32" r="4" fill="#FFFFFF" fill-opacity="0.12"/>
    <text x="690" y="37" fill="#FFFFFF" fill-opacity="0.3" font-family="Inter,Arial,sans-serif" font-size="10" text-anchor="end">GLOBAL VIEW</text>
    <g transform="translate(34 104)" font-family="Inter,Arial,sans-serif">
      <text fill="#FFFFFF" fill-opacity="0.36" font-size="10" letter-spacing="2">GDP GROWTH</text>
      <text y="56" fill="#FFFFFF" font-family="Georgia,serif" font-size="48">2.8%</text>
      <text y="82" fill="#BDE8D2" fill-opacity="0.7" font-size="11">+0.3 pp · annual</text>
    </g>
    <g transform="translate(276 104)" font-family="Inter,Arial,sans-serif">
      <text fill="#FFFFFF" fill-opacity="0.36" font-size="10" letter-spacing="2">INFLATION</text>
      <text y="56" fill="#FFFFFF" font-family="Georgia,serif" font-size="48">3.1%</text>
      <text y="82" fill="#FFFFFF" fill-opacity="0.35" font-size="11">-0.4 pp · annual</text>
    </g>
    <g transform="translate(510 104)" font-family="Inter,Arial,sans-serif">
      <text fill="#FFFFFF" fill-opacity="0.36" font-size="10" letter-spacing="2">UNEMPLOYMENT</text>
      <text y="56" fill="#FFFFFF" font-family="Georgia,serif" font-size="48">5.2%</text>
      <text y="82" fill="#FFFFFF" fill-opacity="0.35" font-size="11">stable · quarterly</text>
    </g>
    <path d="M34 226H718" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <g transform="translate(36 276)">
      <path d="M0 142 C70 130 92 84 160 102 C235 123 269 53 344 71 C426 92 455 18 520 43 C578 65 625 18 680 6 L680 178 L0 178Z" fill="url(#chart)"/>
      <path d="M0 142 C70 130 92 84 160 102 C235 123 269 53 344 71 C426 92 455 18 520 43 C578 65 625 18 680 6" fill="none" stroke="#BDE8D2" stroke-opacity="0.72" stroke-width="2"/>
      <path d="M0 178H680 M0 118H680 M0 58H680" stroke="#FFFFFF" stroke-opacity="0.055"/>
      <g fill="#BDE8D2"><circle cx="160" cy="102" r="4"/><circle cx="344" cy="71" r="4"/><circle cx="520" cy="43" r="4"/><circle cx="680" cy="6" r="4"/></g>
    </g>
  </g>
  <g transform="translate(74 846)" font-family="Inter,Arial,sans-serif">
    <text fill="#FFFFFF" fill-opacity="0.3" font-size="11" letter-spacing="2">EUROPE · AMERICAS · ASIA</text>
    <text x="752" fill="#BDE8D2" fill-opacity="0.65" font-size="11" letter-spacing="2" text-anchor="end">LIVE PRODUCT</text>
  </g>
</svg>
