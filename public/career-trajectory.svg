<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">From Data to Product</title>
  <desc id="desc">A single rising trajectory connects Data, Business, Technology and Product.</desc>
  <defs>
    <linearGradient id="line" x1="120" y1="480" x2="1080" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#BDE8D2" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#BDE8D2" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.92"/>
    </linearGradient>
    <radialGradient id="halo">
      <stop stop-color="#DDF7EA" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#DDF7EA" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g fill="none">
    <path d="M92 496 C270 540 316 356 444 380 C610 412 647 196 786 250 C919 302 973 142 1108 114" stroke="#FFFFFF" stroke-opacity="0.055" stroke-width="46" stroke-linecap="round"/>
    <path d="M92 496 C270 540 316 356 444 380 C610 412 647 196 786 250 C919 302 973 142 1108 114" stroke="url(#line)" stroke-width="2" stroke-linecap="round"/>
    <path d="M1108 114 l-25 -3 m25 3 l-13 22" stroke="#FFFFFF" stroke-opacity="0.75" stroke-width="2"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(166 480)">
      <circle r="66" fill="url(#halo)"/>
      <circle r="8" fill="#BDE8D2" fill-opacity="0.9" filter="url(#glow)"/>
      <circle r="3" fill="#FFFFFF"/>
      <text x="0" y="-34" fill="#FFFFFF" fill-opacity="0.92" font-size="28" text-anchor="middle">Data</text>
      <text x="0" y="43" fill="#FFFFFF" fill-opacity="0.38" font-size="13" letter-spacing="2" text-anchor="middle">SIGNAL</text>
    </g>
    <g transform="translate(445 380)">
      <circle r="58" fill="url(#halo)"/>
      <circle r="7" fill="#BDE8D2" fill-opacity="0.86"/>
      <circle r="2.5" fill="#FFFFFF"/>
      <text x="0" y="-32" fill="#FFFFFF" fill-opacity="0.92" font-size="28" text-anchor="middle">Business</text>
      <text x="0" y="42" fill="#FFFFFF" fill-opacity="0.38" font-size="13" letter-spacing="2" text-anchor="middle">VALUE</text>
    </g>
    <g transform="translate(786 250)">
      <circle r="58" fill="url(#halo)"/>
      <circle r="7" fill="#BDE8D2" fill-opacity="0.86"/>
      <circle r="2.5" fill="#FFFFFF"/>
      <text x="0" y="-32" fill="#FFFFFF" fill-opacity="0.92" font-size="28" text-anchor="middle">Technology</text>
      <text x="0" y="42" fill="#FFFFFF" fill-opacity="0.38" font-size="13" letter-spacing="2" text-anchor="middle">SYSTEMS</text>
    </g>
    <g transform="translate(1064 124)">
      <circle r="78" fill="url(#halo)"/>
      <circle r="9" fill="#FFFFFF" fill-opacity="0.95" filter="url(#glow)"/>
      <circle r="3" fill="#FFFFFF"/>
      <text x="0" y="-42" fill="#FFFFFF" font-size="32" text-anchor="middle">Product</text>
      <text x="0" y="52" fill="#BDE8D2" fill-opacity="0.7" font-size="13" letter-spacing="2" text-anchor="middle">OUTCOMES</text>
    </g>
  </g>
</svg>
